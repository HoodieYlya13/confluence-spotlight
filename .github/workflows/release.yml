name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete any existing release for this tag
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "$TAG" --repo "$REPO" --yes || true

  release:
    needs: cleanup
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libxdo-dev

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SSO_CLIENT_ID: ${{ vars.SSO_CLIENT_ID || secrets.SSO_CLIENT_ID }}
          SSO_ISSUER: ${{ vars.SSO_ISSUER }}
          MCP_SERVER_URL: ${{ vars.MCP_SERVER_URL }}
          SPOTLIGHT_HOTKEY: ${{ vars.SPOTLIGHT_HOTKEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Confluence Spotlight ${{ github.ref_name }}"
          releaseBody: "Cross-platform builds of Confluence Spotlight. macOS and Windows builds are unsigned — see the README for the Gatekeeper bypass."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
